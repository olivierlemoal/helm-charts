apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tt-rss.fullname" . }}
  labels:
    app: {{ include "tt-rss.name" . }}
    chart: {{ include "tt-rss.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "tt-rss.name" . }}
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ include "tt-rss.name" . }}
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
          - name: TTRSS_DB_TYPE
            value: "{{ .Values.database.type }}"
          - name: TTRSS_DB_HOST
            value: "{{ .Values.database.host }}"
          - name: TTRSS_DB_USER
            valueFrom:
              secretKeyRef:
                name: {{ include "tt-rss.fullname" . }}
                key: db-user
          - name: TTRSS_DB_NAME
            value: "{{ .Values.database.name }}"
          - name: TTRSS_DB_PASS
            valueFrom:
              secretKeyRef:
                name: {{ include "tt-rss.fullname" . }}
                key: db-password
          - name: TTRSS_DB_PORT
            value: "{{ .Values.database.port }}"
          - name: TTRSS_SELF_URL_PATH
            value: "{{ .Values.ttrss.selfUrl }}"
          - name: TTRSS_SINGLE_USER_MODE
            value: "{{ .Values.ttrss.singleUser }}"
          ports:
            - name: php
              containerPort: 9000
              protocol: TCP
          volumeMounts:
          - mountPath: /var/www/html
            name: tt-rss-app

        - name: updater
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/opt/tt-rss/updater.sh"]
          env:
          - name: TTRSS_DB_TYPE
            value: "{{ .Values.database.type }}"
          - name: TTRSS_DB_HOST
            value: "{{ .Values.database.host }}"
          - name: TTRSS_DB_USER
            valueFrom:
              secretKeyRef:
                name: {{ include "tt-rss.fullname" . }}
                key: db-user
          - name: TTRSS_DB_NAME
            value: "{{ .Values.database.name }}"
          - name: TTRSS_DB_PASS
            valueFrom:
              secretKeyRef:
                name: {{ include "tt-rss.fullname" . }}
                key: db-password
          - name: TTRSS_DB_PORT
            value: "{{ .Values.database.port }}"
          - name: TTRSS_SELF_URL_PATH
            value: "{{ .Values.ttrss.selfUrl }}"
          - name: TTRSS_SINGLE_USER_MODE
            value: "{{ .Values.ttrss.singleUser }}"
          volumeMounts:
          - mountPath: /var/www/html
            name: tt-rss-app

        - name: nginx
          image: nginx:alpine
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            periodSeconds: 300
            initialDelaySeconds: 30
            httpGet:
              path: /
              port: http
          volumeMounts:
          - mountPath: /var/www/html
            name: tt-rss-app
            readOnly: true
          - name: tt-rss-nginx-conf
            mountPath: /etc/nginx/nginx.conf
            subPath: nginx.conf
            readOnly: true

      volumes:
      - name: tt-rss-app
        persistentVolumeClaim:
          claimName: {{ include "tt-rss.fullname" . }}
      - name: tt-rss-nginx-conf
        configMap:
          name: {{ include "tt-rss.fullname" . }}-nginx

    {{- if .Values.securityContext }}
      securityContext:
{{ toYaml .Values.securityContext | indent 8 }}
    {{- end }}
