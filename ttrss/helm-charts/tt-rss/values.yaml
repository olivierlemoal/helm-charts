# Default values for tt-rss.

database:
  ## possible values: [mysql, pgsql]
  type: "pgsql"

  ## Database host
  host: "postgresql.ttrss.svc.cluster.local"
  
  ## Database user
  user: "ttrss"

  ## Database name
  name: "ttrss"

  ## Database password
  password: ""

  ## Database port
  port: "5432"

ttrss:
  ## Full URL of your tt-rss installation
  selfUrl: "https://tinytinyrss/"
  
  ## Operate in single user mode
  singleUser: "false"

## should be 1 for the moment
replicaCount: 1

## Main ttrss Docker image
image:
  repository: rg.fr-par.scw.cloud/olivierlm/tt-rss
  tag: latest
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

## persistence for feed icons, custom htaccess and config.php
persistence:
  accessMode: ReadWriteOnce
  size: 1Gi
  storageClassName: ""

## http exposure
service:
  type: ClusterIP
  port: 80
  
securityContext:
  ## the data file's owner group
  supplementalGroups: [1001] 
  fsGroup: 1001

ingress:
  enabled: false
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  path: /
  hosts:
    - chart-example.local
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
